<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="css/admin-layout.css" rel="stylesheet">
</head>
<body>

    <div class="wrapper">
        <div id="sidebar-placeholder" class="sidebar"></div>

        <div class="main-content">
            <div id="header-placeholder" class="top-header"></div>

            <div class="content-body">
                <h2 class="mb-4">Tổng quan hệ thống</h2>
                
                <div class="row">
                    <div class="col-md-4">
                        <div class="card-counter primary p-3">
                            <i class="fa fa-code-fork fa-2x opacity-50 float-end"></i>
                            <span class="count-numbers display-6 fw-bold">...</span>
                            <span class="count-name d-block mt-2">Tổng User</span>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card-counter success p-3">
                            <i class="fa fa-database fa-2x opacity-50 float-end"></i>
                            <span class="count-numbers display-6 fw-bold">...</span>
                            <span class="count-name d-block mt-2">User Online</span>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card-counter danger p-3">
                            <i class="fa fa-ticket fa-2x opacity-50 float-end"></i>
                            <span class="count-numbers display-6 fw-bold">...</span>
                            <span class="count-name d-block mt-2">Báo cáo vi phạm</span>
                        </div>
                    </div>
                </div>

                <div class="card mt-4" style="height: 800px;"> 
                    <div class="card-body">
                        <h5 class="card-title">Biểu đồ hoạt động hệ thống</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin-base.js"></script>
    
    <script>
        // Gọi API lấy số liệu dashboard
        // fetch('/api/admin/stats')...
    </script>
</body>
</html>
