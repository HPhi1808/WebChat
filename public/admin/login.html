<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - System Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background-color: #16213e; border: 1px solid #0f3460; width: 100%; max-width: 400px; padding: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .form-control { background-color: #0f3460; border: none; color: #fff; }
        .form-control:focus { background-color: #1a1a2e; color: #fff; box-shadow: none; border: 1px solid #e94560; }
        .btn-primary { background-color: #e94560; border: none; }
        .btn-primary:hover { background-color: #c0354e; }
        label { color: #a0a0a0; }
    </style>
</head>
<body>

    <div class="card text-center">
        <h3 class="mb-4 fw-bold" style="color: #e94560;">ADMINISTRATOR</h3>
        <p class="text-muted small mb-4">Hệ thống quản trị Chat Web</p>

        <form id="adminLoginForm">
            <div class="mb-3 text-start">
                <label class="form-label">Email Quản trị</label>
                <input type="email" id="email" class="form-control" placeholder="admin@system.com" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label">Mật mã</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div id="errorMsg" class="alert alert-danger d-none text-start p-2 small"></div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="btnLogin">ACCESS DASHBOARD</button>
        </form>
        
        <div class="mt-4 pt-3 border-top border-secondary">
            <a href="/" class="text-decoration-none small text-muted">← Quay lại trang người dùng</a>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const errorDiv = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.innerText = "Checking access...";
            errorDiv.classList.add('d-none');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errorDiv.innerText = "⛔ " + (data.message || "Truy cập bị từ chối");
                    errorDiv.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerText = "ACCESS DASHBOARD";
                }
            } catch (err) {
                console.error(err);
                errorDiv.innerText = "Lỗi kết nối Server";
                errorDiv.classList.remove('d-none');
                btn.disabled = false;
                btn.innerText = "ACCESS DASHBOARD";
            }
        });
    </script>
</body>
</html>
